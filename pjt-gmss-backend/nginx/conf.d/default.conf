server {
  listen 80;
  server_name gmss.site www.gmss.site api.gmss.site;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  # 백엔드 인증서는 api.gmss.site만 발급/적용 (www는 Vercel에서 TLS 처리)
  server_name api.gmss.site;

  ssl_certificate /etc/letsencrypt/live/api.gmss.site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.gmss.site/privkey.pem;

  # /api: CORS 처리. add_header는 location 레벨에만 두어 OPTIONS 204 응답에도 적용되도록 함.
  location /api/ {
    add_header 'Access-Control-Allow-Origin' $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    # 커스텀 사용자 ID 헤더는 사용하지 않고, 표준 헤더만 허용
    # 일부 브라우저는 allow-credentials=true 일 때 Allow-Headers의 '*'를 허용하지 않으므로 명시 목록만 사용
    add_header 'Access-Control-Allow-Headers' 'content-type,authorization' always;
    add_header 'Access-Control-Max-Age' 3600 always;

    if ($request_method = 'OPTIONS') {
      return 204;
    }

    # 요약(STT+LLM) 등 장시간 처리 API용 타임아웃 확장
    # - summarize는 FastAPI → spring으로 프록시되므로, spring 쪽에서 다시 FastAPI를 호출하는 구조라면
    #   전체 체인이 이 시간 내에 끝나야 함
    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    proxy_pass http://spring:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
  }

  location / {
    proxy_pass http://spring:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /ws {
    proxy_pass http://spring:8080/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600;
  }
}