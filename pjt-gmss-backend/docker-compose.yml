# 실행: cd pjt-gmss-back 후 docker compose up -d --build
# 첫 배포 시: 인증서 발급 전에는 nginx default.conf에서 443 server 블록을 주석 처리하고
# 80만 띄운 뒤 certbot 발급 후 443 복구하고 docker compose restart nginx

services:
  spring:
    build:
      context: .
    container_name: gmss-spring
    ports:
      - '8080:8080'   # 호스트에서 curl localhost:8080 으로 API 직접 확인용 (nginx 경유 없이)
    environment:
      - CORS_ORIGINS=https://gmss.site,https://www.gmss.site,https://testchat-alpha.vercel.app
      - FRONTEND_BASE_URL=https://www.gmss.site
      # 필요하면 여기서 DB/testchatpy base-url도 환경변수로 주입(프로젝트 설정에 맞게)
    restart: always
    networks: [gmss]

  nginx:
    image: nginx:1.27-alpine
    container_name: gmss-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on: [spring]
    restart: always
    networks: [gmss]

networks:
  gmss:
    driver: bridge
